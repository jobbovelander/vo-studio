services:
  vo-studio:
    build: .
    image: vo-studio:local
    container_name: vo-studio
    restart: unless-stopped
    working_dir: /app
    ports:
      - "5080:5000"
    volumes:
      - /volume1/vo_studio:/data
      - /volume1/docker/vo_studio/app:/app
    environment:
      - VO_DATA_DIR=/data
